# /workspace/gitea/devops_CI_CD/ansible/config/vars.yml
repository:
  url: "https://github.com/CodeSSRockMan/gitea.git"  # Overridden by bootstrap
  branch: "main"  # Default, overridden by bootstrap

#ENDPOINTS NEED TO BE UPDATED
rds_db_host: "your-rds-instance-endpoint"
rds_db_port: "5432"
rds_db_user: "your-db-user"
rds_db_password: "your-db-password"
rds_db_name: "your-db-name"

gitea_repo: "https://github.com/CodeSSRockMan/gitea.git"
gitea_branch: "develop"
gitea_install_dir: "/opt/gitea"
gitea_user: "git"
gitea_port: 3000

# Linters configuration


terraform:
  linter:
    container: "ghcr.io/terraform-linters/tflint:latest"
    args: "--config /code/.tflint.hcl --no-color"
    config:  # Example additional rules
      enabled_rules:
        - "aws_resource_missing_tags"
        - "terraform_unused_declarations"

ansible:
  linter:
    container: "ansible/ansible-lint:latest"
    args: "--parseable-severity -x role-name"
    skip_list:  # Example exclusions
      - "204"  # Lines should be no longer than 120 chars
      - "305"  # Use shell only when shell functionality is required

docker:
  linter:
    container: "hadolint/hadolint:latest"
    args: "--format json"
    rules:  # Example rule overrides
      disable:
        - "DL3008"  # Pin versions in apt-get install
        - "DL3015"  # Avoid additional packages

jenkins:
  linter:
    container: "jenkins/jenkins:lts-jdk11"
    rules:
      strict_mode: true
      ignored_warnings:
        - "missing_agent_declaration"
        - "deprecated_step"


# Logging settings

logging:
  dir: "/workspace/gitea/devops_CI_CD/logs"
  retention_days: 7

# Path shortcuts

paths:
  terraform: "/terraform"
  ansible: "/ansible"
