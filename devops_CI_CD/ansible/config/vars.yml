# Gitea main configuration
gitea:
  repo: "https://github.com/go-gitea/gitea.git"
  install_dir: "/opt/gitea"
  version: "release/v1.23"
  build_tags: "bindata sqlite sqlite_unlock_notify"
  user: "git"
  port: 3000

# Git clone depth (0 = full history)
git_clone_depth: 0

# Go installation version
go_version: "1.23.0"

# Node.js installation
node_setup_url: "https://deb.nodesource.com/setup_18.x"
nodejs_path: "/usr/bin/nodejs"
node_path: "/usr/bin/node"

# MySQL Database configuration
database:
  port: 3306
  admin_user: root
  admin_password: "{{ rds_password }}"  
  # Esto debe resolverse con fetch de SSM
  # Estos valores se deben completar dinámicamente con `set_fact` desde SSM
  # host:
  # user:
  # password:
  # name:
  # tls:
  #   ssl_mode: disable

# Build tags as flat variable (para compatibilidad)
gitea_build_tags: "bindata sqlite sqlite_unlock_notify"

# GCP vas
gcp_zone: us-central1-a
docker_compose_file: docker-compose.yml


