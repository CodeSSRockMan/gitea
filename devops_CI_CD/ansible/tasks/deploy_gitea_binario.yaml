---
- name: Deploy Gitea on GCP VM using official binary installation
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../config/vars.yml

  tasks:
    - name: Include SSM values
      include_tasks: fetch_ssm_vars.yml

    - name: Upload Gitea install script to VM
      shell: |
        gcloud compute scp scripts/install_gitea_bin.sh {{ gcp_vm_name }}:/tmp/install_gitea_bin.sh \
          --project={{ gcp_project }} \
          --zone={{ gcp_zone }} \
          --tunnel-through-iap \
          --impersonate-service-account={{ impersonated_sa }}
      changed_when: false

    - name: Run Gitea install script remotely
      shell: |
        gcloud compute ssh {{ gcp_vm_name }} \
          --project={{ gcp_project }} \
          --zone={{ gcp_zone }} \
          --tunnel-through-iap \
          --impersonate-service-account={{ impersonated_sa }} \
          --command="sudo bash /tmp/install_gitea_bin.sh"
      changed_when: false
