##---
##tasks/deploy_gitea.yml

# 1. Install essential OS packages
- name: Install essential packages
  apt:
    name:
      - git
      - make
      - build-essential
      - wget
      - tar
      - mysql-client
      - python3-pymysql
    update_cache: yes

# 2. Check current Go version
- name: Check current Go version
  shell: |
    if command -v go >/dev/null; then
      go version | awk '{print $3}' | sed 's/go//'
    else
      echo "0"
    fi
  register: current_go_version
  changed_when: false

- name: Set flag if current Go is older than required
  set_fact:
    go_needs_upgrade: true
  when: current_go_version.stdout is version(go_version, '<')

# 3. Install or upgrade Go
- name: Remove existing Go installation
  file:
    path: /usr/local/go
    state: absent
  when: go_needs_upgrade | default(false)

- name: Download Go {{ go_version }} archive
  get_url:
    url: "https://go.dev/dl/go{{ go_version }}.linux-amd64.tar.gz"
    dest: "/tmp/go{{ go_version }}.linux-amd64.tar.gz"
  when: go_needs_upgrade | default(false)

- name: Extract Go to /usr/local
  unarchive:
    src: "/tmp/go{{ go_version }}.linux-amd64.tar.gz"
    dest: /usr/local
    remote_src: yes
  when: go_needs_upgrade | default(false)

- name: Add Go to system PATH
  copy:
    dest: /etc/profile.d/go.sh
    content: |
      export PATH=$PATH:/usr/local/go/bin
    mode: '0755'
  when: go_needs_upgrade | default(false)

- name: Verify installed Go version
  shell: /usr/local/go/bin/go version
  register: go_version_final
  changed_when: false

- name: Show Go version
  debug:
    msg: "Go version is now: {{ go_version_final.stdout }}"

# 4. Configure GOPATH
- name: Ensure GOPATH directory exists
  file:
    path: "{{ ansible_env.HOME }}/go"
    state: directory
    mode: '0755'

- name: Persist Go environment
  copy:
    dest: /etc/profile.d/go_env.sh
    content: |
      export GOPATH={{ ansible_env.HOME }}/go
      export PATH=/usr/local/go/bin:${GOPATH}/bin:$PATH
    mode: '0644'

# 5. Install Node.js 18.x (idempotent)
- name: Check Node.js version (if installed)
  shell: |
    if command -v node >/dev/null; then
      node -v | sed 's/v//'
    else
      echo "0"
    fi
  register: node_version_check
  changed_when: false

- name: Set install_node flag if version is outdated
  set_fact:
    install_node: true
  when: node_version_check.stdout is version('18.0.0', '<')

- name: Download Node.js 18.x setup script
  get_url:
    url: "https://deb.nodesource.com/setup_18.x"
    dest: /tmp/nodesource_setup.sh
    mode: '0755'
  when: install_node | default(false)

- name: Run Node.js setup script
  command: bash /tmp/nodesource_setup.sh
  when: install_node | default(false)

- name: Install Node.js
  apt:
    name: nodejs
    update_cache: yes
  when: install_node | default(false)

- name: Show Node.js version
  debug:
    msg: "Node.js version: {{ node_version_check.stdout }}"


# 6. Ensure git user and Gitea config directory
- name: Ensure git user exists
  ansible.builtin.user:
    name: git
    shell: /bin/bash
    system: yes
    create_home: yes

- name: Ensure Gitea data and log directories exist
  file:
    path: "{{ gitea.install_dir }}/{{ item }}"
    state: directory
    owner: git
    group: git
    mode: '0755'
  loop:
    - data
    - log
    - custom/conf
    - data/gitea-repositories


- name: Ensure Gitea config directory exists
  file:
    path: "{{ gitea.install_dir }}/custom/conf"
    state: directory
    owner: git
    group: git
    mode: '0755'

# 7. Setup Database and app.ini
- name: Create Gitea database
  community.mysql.mysql_db:
    name: "{{ database.name }}"
    state: present
    login_host: "{{ database.host }}"
    login_port: "{{ database.port }}"
    login_user: "{{ database.admin_user }}"
    login_password: "{{ database.admin_password }}"

- name: Create Gitea DB user
  community.mysql.mysql_user:
    name: "{{ database.admin_user }}"
    password: "{{ database.admin_password }}"
    priv: "{{ database.name }}.*:ALL"
    host: "%"
    state: present
    login_host: "{{ database.host }}"
    login_port: "{{ database.port }}"
    login_user: "{{ database.admin_user }}"
    login_password: "{{ database.admin_password }}"

- name: Deploy app.ini
  template:
    src: "{{ playbook_dir }}/../../templates/app.ini.j2"
    dest: "{{ gitea.install_dir }}/custom/conf/app.ini"
    owner: git
    group: git
    mode: '0644'
  vars:
    db_type: mysql
    db_host: "{{ database.host }}"
    db_name: "{{ database.name }}"
    db_user: "{{ database.user }}"
    db_passwd: "{{ database.password }}"
    db_ssl_mode: "{{ (database.tls.ssl_mode if (database.tls is defined and database.tls.ssl_mode is defined) else 'disable') }}"

# 8. Ensure Gitea repo is present and at the right version
- name: Check if Gitea repo is already cloned
  stat:
    path: "{{ gitea.install_dir }}/.git"
  register: gitea_repo_stat

- name: Clone Gitea repository if missing
  git:
    repo: "{{ gitea.repo }}"
    dest: "{{ gitea.install_dir }}"
    version: "{{ gitea.version }}"
    depth: 1
    accept_hostkey: yes
  when: not gitea_repo_stat.stat.exists

- name: Update Gitea repository to {{ gitea.version }}
  git:
    repo: "{{ gitea.repo }}"
    dest: "{{ gitea.install_dir }}"
    version: "{{ gitea.version }}"
    depth: 1
    accept_hostkey: yes
    update: yes
    force: no
  when: gitea_repo_stat.stat.exists


# 9. Build Gitea asynchronously and show full log on completion
- name: Compile Gitea asynchronously
  shell: |
    export PATH=/usr/local/go/bin:$PATH
    cd {{ gitea.install_dir }}
    echo "[INFO] Starting build at $(date)" > /tmp/gitea_build.log
    echo "[INFO] Tags: {{ gitea_build_tags }}" >> /tmp/gitea_build.log
    TAGS="{{ gitea_build_tags }}" make -j1 build >> /tmp/gitea_build.log 2>&1
  args:
    executable: /bin/bash
  async: 3600
  poll: 0
  register: async_build_result


- name: Wait for Gitea build to finish
  async_status:
    jid: "{{ async_build_result.ansible_job_id }}"
  register: gitea_build_result
  until: gitea_build_result.finished
  retries: 60
  delay: 30
  failed_when: false

- name: Show full Gitea build log (last 200 lines)
  shell: tail -n 200 /tmp/gitea_build.log || true
  register: build_full_log
  ignore_errors: true

- name: Print Gitea build log summary
  debug:
    msg: "{{ build_full_log.stdout_lines }}"
  when: build_full_log.stdout_lines is defined

- name: Check Gitea binary exists
  stat:
    path: "{{ gitea.install_dir }}/gitea"
  register: gitea_binary

- name: Deploy Gitea systemd unit
  template:
    src: "{{ playbook_dir }}/../../templates/gitea.service.j2"
    dest: /etc/systemd/system/gitea.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart Gitea

## handlers/main.yml
- name: Reload systemd
  become: yes
  command: systemctl daemon-reload

- name: Restart Gitea
  become: yes
  systemd:
    name: gitea
    state: restarted
    enabled: yes