# /workspace/gitea/devops_CI_CD/ansible/playbooks/deploy/deploy_app.yml
---
- name: Deploy Gitea (Minimal)
  hosts: all
  become: true
  vars_files:
    - "/tmp/bootstrap_vars.yml"  # Jenkins variables
    - "{{ playbook_dir }}/../../config/vars.yml"  # Relative path to repo variables

######################################################  
# 1. Install MySQL client  
# 2. Database setup: create Gitea database and user  
# 3. Deploy Gitea configuration (app.ini)  
#######################################################

  tasks:
   
    - name: Install MySQL client
      apt:
        name: mysql-client
        state: present
        update_cache: yes


    - name: Create Gitea database
      mysql_db:
        name: "{{ database.name }}"
        state: present
        login_host: "{{ database.host }}"
        login_port: "{{ database.port }}"
        login_user: "{{ database.admin_user }}"
        login_password: "{{ database.admin_password }}"

    - name: Create Gitea DB user
      mysql_user:
        name: "{{ database.user }}"
        password: "{{ database.password }}"
        priv: "{{ database.name }}.*:ALL"
        host: "%"
        state: present
        login_host: "{{ database.host }}"
        login_port: "{{ database.port }}"
        login_user: "{{ database.admin_user }}"
        login_password: "{{ database.admin_password }}"


    - name: Deploy Gitea configuration (app.ini)
      template:
        src: "{{ playbook_dir }}/../../templates/app.ini.j2"
        dest: "{{ gitea_install_dir }}/custom/conf/app.ini"
        mode: '0644'
      vars:
        db_type: mysql
        db_host: "{{ database.host }}:{{ database.port }}"
        db_name: "{{ database.name }}"
        db_user: "{{ database.user }}"
        db_passwd: "{{ database.password }}"
        db_ssl_mode: "{{ database.tls.ssl_mode | default('disable') }}"
  
 ##############################################################################

 
  # 1. Install only git, make, golang, npm
    - name: Install core tools
      apt:
        name:
          - git
          - make
          - golang
          - npm
        update_cache: yes

    # 2. Install Node.js 18.x (Gitea requirement)
    - name: Setup NodeSource 18.x
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
        apt-get install -y nodejs
      args:
        executable: /bin/bash

    # 3. Fix node/nodejs conflict
    - name: Create node symlink
      file:
        src: "/usr/bin/nodejs"
        dest: "/usr/bin/node"
        state: link
        force: yes

    # 4. Clone repo (variables from config/vars.yml)
    - name: Clone Gitea
      git:
        repo: "{{ gitea_repo }}"
        dest: "{{ gitea_install_dir }}"
        version: "{{ gitea_branch }}"
        depth: 1

    # 5. Build with bindata (official Gitea method)
    - name: Compile Gitea
      shell: "cd {{ gitea_install_dir }} && TAGS='bindata' make build"
      args:
        executable: /bin/bash
        creates: "{{ gitea_install_dir }}/gitea"  # Skip if exists

    # 6. Deploy systemd service from J2 template
    - name: Configure service
      template:
        src: "{{ playbook_dir }}/../../templates/gitea.service.j2"
        dest: "/etc/systemd/system/gitea.service"
        mode: 0644
      notify: Restart Gitea

  handlers:
    - name: Restart Gitea
      systemd:
        name: gitea
        state: restarted
        enabled: yes