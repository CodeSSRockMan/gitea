---
- name: Run Terraform static analysis  
  hosts: localhost  
  vars_files:  
    - "/tmp/bootstrap_vars.yml"  # Sent by Jenkins master before execution  

  tasks:  
    # 1. Install prerequisites (Git, Docker)  
    - name: Install Git  
      package:  
        name: git  
        state: present  

    - name: Install Docker  
      package:  
        name: docker  
        state: present  

    # 2. Clone repo (branch from bootstrap vars)  
    - name: Clone repository  
      git:  
        repo: "{{ repository.url }}"  
        dest: "/workspace/gitea"  
        version: "{{ repository.branch }}"  
        force: yes  

    # 3. Load project-specific vars.yml from cloned repo  
    - name: Load project variables  
      include_vars:  
        file: "/workspace/gitea/devops_CI_CD/ansible/config/vars.yml"  

    # 4. Find Terraform files  
    - name: Get Terraform files  
      find:  
        paths: "/workspace/gitea/devops_CI_CD/terraform"  
        patterns: "*.tf"  
        recurse: yes  
      register: tf_files  

    # 5. Run tflint with project config  
    - name: Lint Terraform files  
      docker_container:  
        name: "tflint_{{ item | basename }}"  
        image: "{{ terraform.linter.container }}"  
        command: "{{ terraform.linter.args }} /code/{{ item | basename }}"  
        volumes:  
          - "/workspace/gitea/devops_CI_CD/terraform:/code"  
        auto_remove: yes  
      loop: "{{ tf_files.files | map(attribute='path') | list }}"  
      register: lint_results  

    # 6. Save logs  
    - name: Write logs  
      copy:  
        content: "{{ lint_results.results | to_json }}"  
        dest: "/workspace/gitea/devops_CI_CD/logs/{{ ansible_date_time.date }}/tflint.json"  

    # 7. Explicit completion status  
    - name: Exit with status  
      command: exit 0  
      changed_when: false  